name: refresh_bgk_pdfs

# BGK auction-results PDF refresh.
#
# Cron was removed - PDF refresh is now driven by auction_day_pipeline.yml
# which runs daily, checks bgk_auction_calendar, and only fires the full
# refresh+render pipeline on actual auction days (saves LLM tokens).
# This workflow is retained for manual re-runs from the Actions tab.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Refresh BGK auction-result PDFs (incremental)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPINGBEE_API_KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
        run: python scripts/refresh_bgk_pdfs.py

      - name: Refresh spread materialised views
        # Same as in refresh_bgk_xlsx: re-populate v_bgk_*_spread MVs so the
        # downstream dashboard render reads physical tables, not function inlines.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -fsS -X POST "${SUPABASE_URL%/}/rest/v1/rpc/bgk_refresh_spreads" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}'
