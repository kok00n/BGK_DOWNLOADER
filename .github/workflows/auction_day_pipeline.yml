name: auction_day_pipeline

# Daily change-detection watcher.
#
# 1. refresh job: pulls komunikaty page, compares against bgk_auction_results,
#    upserts any new PDFs, and writes new_auctions=N (count of NEW auction
#    DAYS) to step output.
# 2. render job: only runs when new_auctions > 0 (i.e. BGK published a fresh
#    auction PDF today) OR when triggered manually via workflow_dispatch.
#    Refreshes spread MVs, executes the notebook, deploys to GH Pages.
#
# Rationale: BGK does not publish a forward-looking calendar of upcoming
# auctions, so we can't pre-schedule. Instead the watcher runs every day
# at 22:00 UTC (post-auction PDFs are reliably up by ~12:00 Warsaw on
# auction days) and only burns LLM tokens when actual new data lands.

on:
  schedule:
    # 22:00 UTC = 23:00 Warsaw (winter, CET) / 24:00 (summer, CEST).
    # 1h DST drift is fine - BGK PDFs are live by midday on auction days.
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    outputs:
      new_auctions: ${{ steps.refresh.outputs.new_auctions }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - id: refresh
        name: Refresh BGK auction-result PDFs (incremental)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPINGBEE_API_KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
        run: python scripts/refresh_bgk_pdfs.py

      - name: Summary
        if: always()
        run: |
          echo "## Refresh result" >> "$GITHUB_STEP_SUMMARY"
          echo "new_auctions = \`${{ steps.refresh.outputs.new_auctions }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.refresh.outputs.new_auctions }}" == "0" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_No new auction PDFs - render step will be skipped._" >> "$GITHUB_STEP_SUMMARY"
          fi

  render:
    needs: refresh
    # Skip if no new PDFs landed AND this isn't a manual run. Manual
    # workflow_dispatch always renders (escape hatch for notebook edits).
    if: ${{ needs.refresh.outputs.new_auctions != '0' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install all dependencies
        # Both refresh (requests/bs4/etc) and notebook (plotly/nbconvert/
        # anthropic) deps - merged in one pip step.
        run: |
          pip install -r requirements.txt
          pip install -r requirements-notebook.txt

      - name: Opportunistic XLSX refresh
        # BGK XLSX Baza obligacji lags auction-day by ~1-7 days; if they
        # uploaded a new snapshot since the Tue/Fri cron we catch it here
        # so the dashboard reflects today's auction in skład długu /
        # maturity ladder views. If no new XLSX, this is a fast no-op.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPINGBEE_API_KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
        run: python scripts/refresh_bgk_xlsx.py

      - name: Refresh spread materialised views
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # Capture body + status separately so we can show the real
          # PostgREST error message on failure (curl --fail hides it).
          response=$(curl -sS -w "\nHTTP_STATUS:%{http_code}\n" --max-time 180 \
            -X POST "${SUPABASE_URL%/}/rest/v1/rpc/bgk_refresh_spreads" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: timeout=180" \
            -d '{}')
          echo "$response"
          status=$(echo "$response" | grep -oP 'HTTP_STATUS:\K\d+' | tail -1)
          if [[ "$status" != "200" ]]; then
            echo "::error::bgk_refresh_spreads RPC failed (HTTP $status)"
            exit 1
          fi

      - name: Execute notebook -> HTML
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p public
          jupyter nbconvert --execute --to html --no-input \
            --ExecutePreprocessor.timeout=600 \
            --TagRemovePreprocessor.enabled=True \
            --TagRemovePreprocessor.remove_all_outputs_tags=hide-output \
            --output-dir=public --output=index.html \
            notebooks/bgk_dashboard.ipynb

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - id: deployment
        uses: actions/deploy-pages@v4
