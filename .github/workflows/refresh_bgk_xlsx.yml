name: refresh_bgk_xlsx

# BGK Baza obligacji XLSX refresh.
# Source updates weekly to biweekly, so we run twice a week to catch
# new snapshots quickly without polling needlessly.

on:
  schedule:
    # Tue + Fri 17:00 UTC (= 18/19 Europe/Warsaw depending on DST)
    - cron: "0 17 * * 2,5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh BGK XLSX
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/refresh_bgk_xlsx.py
