name: discover_bgk_auctions

# Weekly scout for upcoming BGK auctions. Parses "Informacja_o_przetargu"
# PDFs from the komunikaty page, upserts {auction_date, series} into
# bgk_auction_calendar. The daily auction_day_pipeline reads this table
# and skips the full pipeline (XLSX/PDF refresh + LLM-heavy render) on
# non-auction days.

on:
  schedule:
    # Sunday 12:00 UTC - by Monday morning we have next week's auctions
    # in DB. BGK typically announces 5-10 days ahead.
    - cron: "0 12 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Discover upcoming auctions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPINGBEE_API_KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
        run: python scripts/refresh_bgk_calendar.py
